services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres-dev-stock
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -d postgres -U postgres']
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - stock-dev:/var/lib/postgresql/data

volumes:
  stock-dev:
